name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      PEGASUS_AUTH_DISABLED: 'true'
      BITACORA_DATA_MODE: 'fixture'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build:shared
      - run: npm test
      - run: npm run build -w @redesas-lite/bff
      - run: npm run build -w @redesas-lite/web
